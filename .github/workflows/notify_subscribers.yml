# This is a basic workflow that is manually triggered

name: Notify mobile agent subscribers of release

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:
    # Inputs the workflow accepts.
    inputs:
      name:
        # Friendly description to be shown in the UI instead of 'name'
        description: 'Notify mobile agent subscribers'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout code
       uses: actions/checkout@v2
       with:
         fetch-depth: 0
     - name: Changelog
       uses: Bullrich/generate-release-changelog@master
       id: Changelog
       env:
         REPO: ${{ github.repository }}
     - name: Create release
       uses: actions/create-release@v1
       id: create_release
       with:
         draft: true
         prerelease: false
         release_name: ${{github.ref}}
         tag_name: ${{ github.ref }}
         body: |
             ${{ steps.Changelog.outputs.changelog }}
       env:
         GITHUB_TOKEN: ${{ github.token }}
     - name: Notify Slack Channel
       id: notify
       run: |
         curl -X POST -H 'Content-type: application/json' \
         --data 'The Android mobile agent has created a new release candidate ${{steps.create_release.outputs.html_url}}' \
         'https://hooks.slack.com/services/${{secrets.SLACK_WEBHOOK_TOKEN}}'
