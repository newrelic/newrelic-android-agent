# This is a basic workflow that is manually triggered

name: Notify mobile agent subscribers of release

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:
    # Inputs the workflow accepts.
    inputs:
      name:
        # Friendly description to be shown in the UI instead of 'name'
        description: 'Notify mobile agent subscribers'

permissions:
  # This permission is needed so that git tags can be created.
  contents: write
  # This permission is needed for OIDC based publishing.
  id-token: write

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
     - name: Create release
       uses: actions/create-release@v1
       id: create_release
     - name: Notify Slack Channel
       id: notify
       run: |
         curl -X POST -H 'Content-type: application/json' \
         --data 'The Android mobile agent has created a new release candidate ${{steps.create_release.outputs.html_url}}' \
         'https://hooks.slack.com/services/${{secrets.SLACK_WEBHOOK_TOKEN}}'
