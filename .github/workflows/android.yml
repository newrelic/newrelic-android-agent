name: Android CI

on:
  push:
    branches: [ "develop", "main", "feature/*" ]
  pull_request:
    branches: [ "develop", "main" ]

  workflow_call:
    inputs:
      ref:
        description: 'Git ref to build (defaults to event ref)'
        required: false
        default: ''
        type: string

  workflow_dispatch:
    inputs:
    #  working-branch:
    #    description: 'TBA: Build this branch (default is current)'
    #    required: false
    #    default: ${{ env.GITHUB_REF_NAME }}
    #    type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
      - name: set up JDK 11
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Set up Gradle
        uses: gradle/gradle-build-action@749f47bda3e44aa060e82d7b3ef7e40d953bd629 # v2.4.2
        with:
          gradle-version: current
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        id: build-step
        run: ./gradlew build
      - name: Upload build reports
        if: failure() && steps.build-step.outcome != 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-reports
          path: |
            agent/build/reports/tests/test/
            agent-core/build/reports/tests/test/
            instrumentation/gradle/build/reports/tests/test/
            plugins/gradle/build/reports/tests/test
          if-no-files-found: ignore
          retention-days: 7
